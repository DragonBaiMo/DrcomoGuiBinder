name: DrcomoGuiBinder
version: '${project.version}'
main: cn.drcomo.drcomoguibinder.DrcomoGuiBinder
api-version: '1.20'
depend:
  - DrcomoCoreLib
commands:
  guibinder:
    description: 'DrcomoGuiBinder 主指令'
    usage: '/<command> help'
    aliases: [dgb, drgb]
    permission: drcomoguibinder.command
permissions:
  drcomoguibinder.command:
    description: '允许使用 /guibinder 指令'
    default: true
  drcomoguibinder.reload:
    description: '允许重载插件配置'
    default: op
  drcomoguibinder.open:
    description: '允许打开自定义 GUI'
    default: true
  drcomoguibinder.open.others:
    description: '允许为其他玩家打开 GUI'
    default: op
