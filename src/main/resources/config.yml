# =============================
# DrcomoGuiBinder 主配置文件
# =============================
# 所有注释与配置项均为中文，方便直接部署。

# 调试日志相关设置
debug:
  # 输出等级: DEBUG / INFO / WARN / ERROR / NONE
  level: INFO
  # 日志前缀，可使用颜色符号
  prefix: "&f[&bGuiBinder&r]&f "
  # 额外日志文件，留空表示不写入文件
  file: "debug.log"

# 多语言配置
language:
  # 语言文件在 plugins/DrcomoGuiBinder/ 下的相对路径（不带 .yml）
  file: "lang"
  # 当语言文件被修改时是否自动热重载
  auto-reload: true

# PlaceholderAPI 扩展标识符
placeholder:
  identifier: "drcomoguibinder"

# 音效管理配置
sounds:
  # 音效定义文件（不带 .yml）
  config: "sounds"
  # 全局音量倍率
  volume: 1.0
  # 当找不到音效键时是否输出警告
  warn-missing: true

# GUI 相关参数
gui:
  # GUI 配置所在文件夹，相对于插件数据目录
  folder: "guis"
  # 会话超时时长（秒），<=0 表示不过期
  session-timeout: 300
  # 默认打开音效键，留空代表不播放
  default-open-sound: "menu_open"
  # 默认关闭音效键，留空代表不播放
  default-close-sound: "menu_close"
  # 是否在玩家离线时强制关闭菜单
  close-on-quit: true

# 权限节点，所有节点均支持通过 Bukkit 权限系统自定义
permissions:
  reload: "drcomoguibinder.reload"
  open: "drcomoguibinder.open"
  open-others: "drcomoguibinder.open.others"

# 指令层设置
command:
  # 是否允许控制台使用打开菜单功能
  allow-console-open: true
  # 是否在重载后自动提示在线管理员
  notify-reload-success: true

# GUI 配置热重载设置
hot-reload:
  # 监听 gui 文件夹中 yml 文件的变动并自动重新加载
  enable: true
