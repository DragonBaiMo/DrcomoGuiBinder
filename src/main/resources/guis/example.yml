# 示例菜单，展示基础能力
id: "example"
title: "&aGuiBinder 示例菜单"
rows: 3
open-sound: "menu_open"
close-sound: "menu_close"
items:
  background:
    slots:
      - "0-8"
      - "18-26"
    material: "GRAY_STAINED_GLASS_PANE"
    name: "&7等待配置"
    lore:
      - "&7请在 guis/example.yml 中修改此文件"
    glow: false
  info:
    slot: 13
    material: "BOOK"
    name: "&a欢迎使用 GuiBinder"
    lore:
      - "&7点击后向你展示消息提示"
    actions:
      - type: "message"
        key: "example.clicked"
      - type: "sound"
        sound: "menu_click"
  broadcast:
    slot: 11
    material: "COMPASS"
    name: "&a向服务器广播"
    lore:
      - "&7演示如何调用控制台指令"
      - "&7指令中支持 {player} 占位符"
    actions:
      - type: "console-command"
        command: "say 玩家 {player} 打开了 GuiBinder 示例菜单"
      - type: "close"
  reopen:
    slot: 15
    material: "ENDER_EYE"
    name: "&a再次打开"
    lore:
      - "&7演示打开其他菜单"
    actions:
      - type: "open"
        target: "example"
